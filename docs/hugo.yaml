baseURL: https://flagos-ai.github.io/FlagGems/
title: FlagGems
languageCode: en-us
theme:
  - hugo-book

# Language settings
contentDir: content/en
defaultContentLanguage: en
defaultContentLanguageInSubdir: false

# Adopt a global timezone
timeZone: UTC

enableGitInfo: true

# Caches
caches:
  images:
    dir: :cacheDir/images
    maxAge: -1
  modules:
    dir: :cacheDir/modules
    maxAge: -1

markup:
  goldmark:
    extensions:
      definitionList: true
      table: true
      typographer: false
    parser:
      attribute: true
      autoHeadingID: true
      autoHeadingIDType: blackfriday
    renderer:
      unsafe: true
  highlight:
    codeFences: true
    guessSyntax: false
    hl_Lines: ""
    lineNoStart: 1
    lineNos: false
    lineNumbersInTable: true
    noClasses: true
    style: github-dark
    tabWidth: 4

  tableOfContents:
    endLevel: 3
    ordered: false
    startLevel: 1

menus:
  main:
    - name: Home
      pageRef: /
      weight: 10
    - name: Features
      pageRef: /features
      weight: 20
    - name: Installation
      pageRef: /install
      weight: 30
  after:
    - name: "Github"
      url: "https://github.com/flagos-ai/FlagGems"
      weight: 10
    - name: "FlagOS"
      url: "https://flagos.io/"
      weight: 20

# Language definitions.
languages:
  en:
    title: FlagGems
    languageName: English
    contentDir: content/en
    weight: 1
    languagedirection: ltr

  zh-cn:
    title: FlagGems
    languageName: 简体中文
    weight: 2
    contentDir: content/zh-cn
    languagedirection: ltr

module:
  mounts:
    - source: i18n/en
      target: i18n
    - source: i18n/zh-cn
      target: i18n
    - source: ../conf
      target: data

# outputFormats:
#   coverage:
#     mediateType: text/html
#     isHTML: true
#     path: coverage

params:
  copyright_flagos: The FlagOS contributors
  BookSection: '*'
  BookSearch: false   # search is using flexsearch, enable later
  BookTheme: "auto"
  BookToC: true
  BookLastChangeLink: 'https://github.com/flagos-ai/FlagGems/commit/{{ .GitInfo.Hash }}'
